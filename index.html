<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Under Construction</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #f5c400;
      --black: #0e0e0e;
      --stripe: repeating-linear-gradient(
        -45deg,
        var(--yellow) 0px,
        var(--yellow) 20px,
        var(--black) 20px,
        var(--black) 40px
      );
    }

    body {
      background-color: var(--black);
      color: var(--yellow);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated stripe border top & bottom */
    body::before, body::after {
      content: '';
      position: fixed;
      left: 0; right: 0;
      height: 28px;
      background: var(--stripe);
      background-size: 56px 56px;
      animation: slide 1.2s linear infinite;
      z-index: 10;
    }
    body::before { top: 0; }
    body::after  { bottom: 0; animation-direction: reverse; }

    @keyframes slide {
      from { background-position: 0 0; }
      to   { background-position: 56px 0; }
    }

    /* Pulsing background glow */
    .glow-bg {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245,196,0,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1);   opacity: 0.8; }
      50%       { transform: translate(-50%, -50%) scale(1.3); opacity: 1;   }
    }

    /* Main card */
    .card {
      position: relative;
      text-align: center;
      padding: 3rem 4rem;
      border: 3px solid var(--yellow);
      box-shadow: 0 0 0 6px var(--black), 0 0 0 9px var(--yellow), 8px 8px 0 9px var(--yellow);
      animation: fadeIn 1s ease both;
      max-width: 90vw;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Emoji bounce */
    .emoji {
      font-size: clamp(4rem, 12vw, 7rem);
      display: block;
      animation: bounce 1.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) infinite;
      line-height: 1;
      margin-bottom: 1rem;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0)    rotate(-4deg); }
      30%       { transform: translateY(-18px) rotate(4deg);  }
      60%       { transform: translateY(-8px)  rotate(-2deg); }
    }

    /* Headline */
    h1 {
      font-family: 'Black Ops One', sans-serif;
      font-size: clamp(2.4rem, 8vw, 5.5rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--yellow);
      text-shadow:
        4px 4px 0 rgba(245,196,0,0.25),
        0 0 40px rgba(245,196,0,0.5);
      animation: flicker 5s infinite;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96%            { opacity: 0.6; }
      97%            { opacity: 1; }
      98%            { opacity: 0.4; }
      99%            { opacity: 1; }
    }

    /* Tagline */
    .tagline {
      margin-top: 1.2rem;
      font-size: clamp(0.7rem, 2vw, 0.95rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.65;
      animation: fadeIn 1s 0.5s ease both;
    }

    /* Blinking cursor line */
    .tagline::after {
      content: '_';
      animation: blink 1s step-start infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 2rem;
      width: 100%;
      height: 10px;
      background: rgba(245,196,0,0.15);
      border: 1px solid rgba(245,196,0,0.4);
      overflow: hidden;
      animation: fadeIn 1s 0.8s ease both;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--yellow);
      animation: load 4s cubic-bezier(0.4,0,0.2,1) 1s forwards;
      box-shadow: 0 0 12px var(--yellow);
    }
    @keyframes load {
      0%   { width: 0%; }
      40%  { width: 55%; }
      70%  { width: 72%; }
      85%  { width: 78%; }
      100% { width: 78%; } /* stalls — it's under construction after all */
    }

    .progress-label {
      margin-top: 0.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      opacity: 0.5;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      width: 4px; height: 4px;
      background: var(--yellow);
      border-radius: 50%;
      opacity: 0;
      animation: float var(--dur) var(--delay) ease-in infinite;
    }
    @keyframes float {
      0%   { opacity: 0;   transform: translateY(100vh) scale(0.5); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { opacity: 0;   transform: translateY(-10vh) scale(1.2); }
    }
  </style>
</head>
<body>

  <div class="glow-bg"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="card">
    <span class="emoji">🚧</span>
    <h1>Under<br>Construction</h1>
    <p class="tagline">One moment please</p>
    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>
    <p class="progress-label">Loading... please stand by</p>
  </div>

  <script>
    // Generate floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        --dur: ${4 + Math.random() * 8}s;
        --delay: ${Math.random() * 8}s;
        width: ${2 + Math.random() * 4}px;
        height: ${2 + Math.random() * 4}px;
        opacity: 0;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
